<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema profissional de agendamento de reuniões">
    <title>Gerenciador de Reuniões</title>
    <link rel="stylesheet" href="reunioes.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">📅</div>
                    <div class="logo-text">
                        <h1>Gerenciador de Reuniões</h1>
                        <p>Organize seus encontros profissionais</p>
                    </div>
                </div>
                <div class="header-info">
                    <span id="hora-atual" class="hora-atual"></span>
                </div>
            </div>
        </header>

        <!-- Notificação de Reunião em Andamento -->
        <div id="reuniao-ao-vivo" class="reuniao-ao-vivo hidden" role="alert" aria-live="polite">
            <div class="reuniao-ao-vivo-content">
                <div class="reuniao-ao-vivo-indicator">
                    <span class="pulse"></span>
                    <span class="pulse-text">AO VIVO</span>
                </div>
                <div class="reuniao-ao-vivo-info">
                    <h3 id="reuniao-titulo">Reunião em andamento</h3>
                    <p id="reuniao-tempo">Tempo restante: --</p>
                </div>
            </div>
        </div>

        <main class="main-content">
            <!-- Painel de Formulário -->
            <section class="form-section">
                <div class="form-card">
                    <h2 class="form-title">Nova Reunião</h2>
                    
                    <form id="form-reuniao" class="form" novalidate>
                        <!-- Campo: Título -->
                        <div class="form-group">
                            <label for="titulo" class="form-label">
                                Título da Reunião <span class="required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="titulo" 
                                name="titulo"
                                placeholder="Ex: Reunião com cliente" 
                                required
                                minlength="3"
                                maxlength="100"
                                class="form-input"
                                aria-required="true"
                                aria-describedby="titulo-error"
                            >
                            <span id="titulo-error" class="error-message" role="alert"></span>
                        </div>
                        
                        <!-- Campo: Participantes -->
                        <div class="form-group">
                            <label for="participantes" class="form-label">
                                Participantes <span class="required">*</span>
                            </label>
                            <input 
                                type="text" 
                                id="participantes" 
                                name="participantes"
                                placeholder="Ex: João Silva, Maria Santos" 
                                required
                                minlength="3"
                                maxlength="200"
                                class="form-input"
                                aria-required="true"
                                aria-describedby="participantes-error"
                            >
                            <span id="participantes-error" class="error-message" role="alert"></span>
                        </div>

                        <!-- Campos: Data -->
                        <div class="form-group">
                            <label for="data" class="form-label">
                                Data <span class="required">*</span>
                            </label>
                            <input 
                                type="date" 
                                id="data" 
                                name="data"
                                required
                                class="form-input"
                                aria-required="true"
                                aria-describedby="data-error"
                            >
                            <span id="data-error" class="error-message" role="alert"></span>
                        </div>

                        <!-- Campos: Hora Início e Fim -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="hora-inicio" class="form-label">
                                    Início <span class="required">*</span>
                                </label>
                                <input 
                                    type="time" 
                                    id="hora-inicio" 
                                    name="hora-inicio"
                                    required
                                    class="form-input"
                                    aria-required="true"
                                    aria-describedby="hora-inicio-error"
                                >
                                <span id="hora-inicio-error" class="error-message" role="alert"></span>
                            </div>
                            
                            <div class="form-group">
                                <label for="hora-fim" class="form-label">
                                    Fim <span class="required">*</span>
                                </label>
                                <input 
                                    type="time" 
                                    id="hora-fim" 
                                    name="hora-fim"
                                    required
                                    class="form-input"
                                    aria-required="true"
                                    aria-describedby="hora-fim-error"
                                >
                                <span id="hora-fim-error" class="error-message" role="alert"></span>
                            </div>
                        </div>

                        <!-- Campo: Descrição -->
                        <div class="form-group">
                            <label for="descricao" class="form-label">Descrição / Pauta</label>
                            <textarea 
                                id="descricao" 
                                name="descricao"
                                placeholder="Tópicos a discutir, objetivos, etc..."
                                maxlength="500"
                                class="form-input form-textarea"
                                aria-describedby="descricao-count"
                            ></textarea>
                            <small id="descricao-count" class="form-hint">
                                <span id="char-count">0</span>/500 caracteres
                            </small>
                        </div>

                        <!-- Botão de Envio -->
                        <button 
                            type="submit" 
                            class="btn btn-primary btn-block"
                            id="btn-submit"
                        >
                            Agendar Reunião
                        </button>
                    </form>
                </div>
            </section>

            <!-- Painel de Reuniões -->
            <section class="reunioes-section">
                <div class="reunioes-card">
                    <div class="reunioes-header">
                        <h2 class="reunioes-title">Reuniões Agendadas</h2>
                        <div class="filtros">
                            <input 
                                type="date" 
                                id="filtro-data"
                                class="form-input filtro-input"
                                aria-label="Filtrar reuniões por data"
                            >
                            <button 
                                type="button"
                                onclick="limparFiltro()" 
                                class="btn btn-secondary btn-small"
                                aria-label="Limpar filtro de data"
                            >
                                Limpar
                            </button>
                        </div>
                    </div>
                    
                    <!-- Lista de Reuniões -->
                    <div id="lista-reunioes" class="lista-reunioes" role="region" aria-live="polite" aria-label="Lista de reuniões">
                        <div class="carregando">
                            <div class="spinner"></div>
                            <p>Carregando reuniões...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal para confirmar exclusão -->
    <div id="modal-excluir" class="modal" role="alertdialog" aria-labelledby="modal-title" aria-describedby="modal-desc" aria-hidden="true">
        <div class="modal-overlay" onclick="fecharModal()"></div>
        <div class="modal-content">
            <h3 id="modal-title" class="modal-title">Confirmar Exclusão</h3>
            <p id="modal-desc" class="modal-description">Tem certeza que deseja excluir esta reunião? Esta ação não pode ser desfeita.</p>
            <div class="modal-buttons">
                <button 
                    type="button"
                    onclick="fecharModal()" 
                    class="btn btn-secondary"
                    aria-label="Cancelar exclusão"
                >
                    Cancelar
                </button>
                <button 
                    type="button"
                    onclick="confirmarExclusao()" 
                    class="btn btn-danger"
                    aria-label="Confirmar exclusão da reunião"
                >
                    Excluir
                </button>
            </div>
        </div>
    </div>

    <!-- Container de Notificações -->
    <div id="toast-container" class="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="reunioes.js"></script>
</body>
</html>
